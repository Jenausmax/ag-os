telegram:
  token: "${TELEGRAM_TOKEN}"
  allowed_users: "${TELEGRAM_ALLOWED_USERS}"

agents:
  session_name: "ag-os"
  master:
    name: "master"
    model: "claude-cli"
    runtime: "host"
    type: "permanent"
    # model_provider: "claude-sub"   # ссылка на ключ из model_providers ниже
    # extra_args: дополнительные CLI-флаги к `claude` при старте tmux-окна.
    # Применяется только для host/tmux runtime; в docker игнорируется.
    # Пример — стартовать мастер с пропуском подтверждений всех действий:
    #   extra_args: ["--dangerously-skip-permissions"]
    extra_args: ["--dangerously-skip-permissions"]
  permanent: []

# Провайдеры моделей для sub-агентов. Ключи используются в поле
# `model_provider` у агента. Секреты НЕ хранятся здесь — только имя
# переменной окружения через `api_key_env`.
model_providers:
  # Подписка Claude Code CLI — дефолт, ничего настраивать не надо.
  claude-sub:
    provider: "claude_subscription"

  # Официальный Anthropic API по ключу.
  # anthropic-api:
  #   provider: "anthropic_api"
  #   api_key_env: "ANTHROPIC_API_KEY"
  #   model_name: "claude-sonnet-4-5"

  # z.ai (GLM) — anthropic-совместимый эндпоинт под Claude Code.
  # zai-glm:
  #   provider: "anthropic_compatible"
  #   base_url: "https://<endpoint-из-доки-zai>"
  #   model_name: "glm-4.6"
  #   api_key_env: "ZAI_API_KEY"
# MiniMax — anthropic-совместимый эндпоинт.
  minimax:
    provider: "anthropic_compatible"
    base_url: "https://api.minimax.io/anthropic"
    model_name: "MiniMax-M2.7"
    api_key_env: "MINIMAX_API_KEY"
  # MiniMax — anthropic-совместимый эндпоинт.
  # minimax:
  #   provider: "anthropic_compatible"
  #   base_url: "https://<endpoint-из-доки-minimax>"
  #   model_name: "MiniMax-M2"
  #   api_key_env: "MINIMAX_API_KEY"

  # Локальная Ollama через LiteLLM-прокси (см. docker-compose профиль local-models).
  # ollama-local:
  #   provider: "anthropic_compatible"
  #   base_url: "http://litellm:4000"
  #   model_name: "ollama/llama3.1"
  #   api_key_env: "LITELLM_KEY"

docker:
  defaults:
    cpus: 2
    memory: "4g"
    network: "ag-os-net"
    workspace_base: "/data/ag-os/workspaces"
    shared_dir: "/data/ag-os/shared"

guard:
  enabled: false
  llm_enabled: true
  # Один из двух вариантов (не оба):
  #   1) legacy: явный ключ Anthropic Haiku.
  haiku_api_key: ""
  #   2) ссылка на провайдера из model_providers ниже. Поддерживаются
  #      anthropic_api и anthropic_compatible (z.ai, MiniMax, litellm).
  #      claude_subscription нельзя — Python SDK требует API-ключ.
  # model_provider: "anthropic-api"

scheduler:
  enabled: true

database:
  path: "/data/ag-os/db/ag-os.db"

# Obsidian vault как knowledge base (AGOS-0031).
# raw/<agent>/ — личный блокнот агента (writable только этим агентом).
# wiki/ — курированные заметки, single-writer: только мастер.
# Sub-агенты в docker получают /vault/raw/me как rw и /vault/wiki как ro.
vault:
  enabled: true
  base_path: "/data/ag-os/vault"
  raw_retention_days: 30
  processing_cron: "0 3 * * *"   # ежедневный проход мастера в 03:00
  git_enabled: true              # автоматический git init для аудита истории
